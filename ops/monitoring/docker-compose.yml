# AskAlfred monitoring stack.
#
# Scrapes the Prometheus textfiles written by core/observability_runtime.py
# (repo-root ../../prometheus_textfiles) through node_exporter's textfile
# collector, evaluates the shipped alert rules, forwards firing alerts to
# Alertmanager, and serves a provisioned Grafana dashboard.
#
# Run from this directory (ops/monitoring):
#   docker compose up -d
#
#   Prometheus   -> http://localhost:9090
#   Alertmanager -> http://localhost:9093
#   Grafana      -> http://localhost:3000  (admin / admin by default; change it)
#
# The AskAlfred app itself runs on the host (Streamlit) and only needs
# SERVICE_METRICS_FILE / PROMETHEUS_METRICS_FILE pointed at ../../prometheus_textfiles.

name: askalfred-monitoring

services:
  node-exporter:
    image: prom/node-exporter:v1.8.2
    container_name: askalfred-node-exporter
    restart: unless-stopped
    command:
      - '--collector.textfile.directory=/textfiles'
    volumes:
      # Host directory the app publisher writes *.prom files into, read-only.
      - ../../prometheus_textfiles:/textfiles:ro
    expose:
      - '9100'

  prometheus:
    image: prom/prometheus:v2.55.1
    container_name: askalfred-prometheus
    restart: unless-stopped
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.enable-lifecycle'
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      # Application alert rules — the checked-in, generated artifact.
      - ../askalfred_alerts.yml:/etc/prometheus/rules/askalfred_alerts.yml:ro
      # Infrastructure alerts (exporter down / stale metrics / parse errors).
      - ./prometheus/rules/infra_alerts.yml:/etc/prometheus/rules/infra_alerts.yml:ro
      - prometheus-data:/prometheus
    ports:
      - '9090:9090'
    depends_on:
      - node-exporter
      - alertmanager

  alertmanager:
    image: prom/alertmanager:v0.27.0
    container_name: askalfred-alertmanager
    restart: unless-stopped
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
    volumes:
      - ./alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager-data:/alertmanager
    ports:
      - '9093:9093'

  grafana:
    image: grafana/grafana:11.3.0
    container_name: askalfred-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: 'false'
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    ports:
      - '3000:3000'
    depends_on:
      - prometheus

volumes:
  prometheus-data:
  alertmanager-data:
  grafana-data:
