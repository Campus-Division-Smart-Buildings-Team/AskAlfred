name: Security Dependency Scanning

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'requirements.txt'
      - '.github/workflows/security-scan.yml'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'requirements.txt'
  schedule:
    # Run security scans daily at 2 AM UTC
    - cron: '0 2 * * *'

jobs:
  security-scan:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12']
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install safety pip-audit bandit
      
      - name: Run Safety check
        id: safety
        continue-on-error: true
        run: |
          echo "## 🔒 Safety Vulnerability Check" >> $GITHUB_STEP_SUMMARY
          safety check --json > safety-report.json || true
          safety check >> $GITHUB_STEP_SUMMARY || echo "⚠️ Vulnerabilities detected" >> $GITHUB_STEP_SUMMARY
      
      - name: Run pip-audit
        id: pip-audit
        continue-on-error: true
        run: |
          echo "## 📦 Pip-Audit Check" >> $GITHUB_STEP_SUMMARY
          pip-audit --desc >> $GITHUB_STEP_SUMMARY || echo "⚠️ Vulnerabilities detected" >> $GITHUB_STEP_SUMMARY
      
      - name: Run Bandit security check
        id: bandit
        continue-on-error: true
        run: |
          echo "## 🔐 Bandit Code Security Check" >> $GITHUB_STEP_SUMMARY
          bandit -r . -ll -f json -o bandit-report.json || true
          bandit -r . -ll >> $GITHUB_STEP_SUMMARY || echo "⚠️ Issues detected" >> $GITHUB_STEP_SUMMARY
      
      - name: Check requirements.txt pinning
        id: pinning
        run: |
          echo "## 📌 Requirements Pinning Check" >> $GITHUB_STEP_SUMMARY
          python scripts/security_scan.py --json
      
      - name: Upload security reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-reports-${{ matrix.python-version }}
          path: |
            safety-report.json
            bandit-report.json
      
      - name: Comment PR with security results
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let comment = '## 🔐 Security Scan Results\n\n';
            
            if (fs.existsSync('safety-report.json')) {
              const safetyReport = JSON.parse(fs.readFileSync('safety-report.json', 'utf8'));
              comment += `**Safety Check**: ${safetyReport.scanned_packages ? safetyReport.scanned_packages.length : 0} packages scanned\n`;
            }
            
            comment += '\n✅ Full security scan complete. See workflow logs for details.';
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });
      
      - name: Fail if vulnerabilities found (strict mode)
        if: failure()
        run: |
          echo "🚨 Security vulnerabilities detected!"
          exit 1

  dependency-update-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          cache: 'pip'
      
      - name: Check for outdated packages
        id: outdated
        continue-on-error: true
        run: |
          pip install pip-tools
          pip list --outdated
      
      - name: Create issue for outdated packages
        if: failure() && github.event_name == 'schedule'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '[Security] Scheduled dependency update check',
              body: 'Automated security scan detected outdated packages. Please review and update dependencies.',
              labels: ['security', 'dependencies']
            });
